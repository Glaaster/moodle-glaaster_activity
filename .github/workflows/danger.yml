name: Danger Review

on:
  pull_request:
    branches:
      - main
      - 'moodle/4.**'

jobs:
  danger:
    name: Danger review
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Danger
        run: npm install -g danger

      - name: Run Danger
        run: danger ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_KEYS: ${{ vars.JIRA_KEYS }}
          JIRA_URL: ${{ vars.JIRA_URL }}
