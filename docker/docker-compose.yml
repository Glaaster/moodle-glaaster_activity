services:
    nginx:
        image: nginx:alpine
        ports:
            - '8080:80'
        volumes:
            - './nginx.conf:/etc/nginx/nginx.conf:ro'
        depends_on:
            - moodle

    mariadb:
        image: docker.io/bitnami/mariadb:latest
        ports:
            - "3306:3306"
        environment:
            - ALLOW_EMPTY_PASSWORD=yes                # Allow empty root password (development only)
            - MARIADB_USER=bn_moodle                  # Database user for Moodle
            - MARIADB_DATABASE=bitnami_moodle         # Database name
            - MARIADB_CHARACTER_SET=utf8mb4           # Set database character set
            - MARIADB_COLLATE=utf8mb4_unicode_ci      # Set database collation
        volumes:
            - 'mariadb_data:/bitnami/mariadb'         # Persist MariaDB data

    moodle:
        image: docker.io/bitnami/moodle:4.5
        expose:
            - '8080'
        environment:
            - moodleSkipInstall=true                  # Force the installation process (config.php will be generated)
            - MOODLE_DATABASE_HOST=mariadb            # Database host (service name 'mariadb')
            - MOODLE_DATABASE_PORT_NUMBER=3306        # Database port
            - MOODLE_DATABASE_USER=bn_moodle          # Must match MariaDB user
            - MOODLE_DATABASE_NAME=bitnami_moodle     # Must match MariaDB database name
            - ALLOW_EMPTY_PASSWORD=yes                # Allow empty password (development only)
            - BITNAMI_DEBUG=true
            - MOODLE_HOST=your-tunnel-hostname.trycloudflare.com/moodle
            - MOODLE_REVERSEPROXY=yes
            - MOODLE_SSLPROXY=yes
            - MOODLE_WWWROOT=https://your-tunnel-hostname.trycloudflare.com/moodle
        volumes:
            - 'moodle_data:/bitnami/moodle'           # Persist Moodle installation files
            - 'moodledata_data:/bitnami/moodledata'     # Persist Moodle data (uploaded files, etc.)
        #      - './glaaster:/opt/bitnami/moodle/mod/glaaster:ro' # Mount your custom plugin in read-only mode only to validate the plugin structure
        depends_on:
            - mariadb

volumes:
    mariadb_data:
        driver: local
    moodle_data:
        driver: local
    moodledata_data:
        driver: local
